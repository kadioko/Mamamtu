version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://mamamtu:${POSTGRES_PASSWORD:-mamamtu123}@postgres:5432/mamamtu
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-your-secret-key-here}
      - SEED_DATABASE_TOKEN=${SEED_DATABASE_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: mamamtu
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mamamtu123}
      POSTGRES_DB: mamamtu
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mamamtu"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
